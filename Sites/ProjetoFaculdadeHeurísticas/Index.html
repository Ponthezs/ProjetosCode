<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa - IMC - Cadastro de Colecionaveis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <h2>Novo Cadastro de Miniaturas</h2>

    <form id="CadastroForm">
        <div class="Form-group">
            <label for="nome">Nome do Modelo (ex: Vw Parati G3)</label>
            <input type="text" id="nome" placeholder="Digite o nome..." required>
        </div>

        <div class="form-group">
            <label for="fabricante">Fabricante</label>
            <select id="fabricante" required>
                <option value="">Selecione o fabricante</option>
                <option value="Hot Wheels">Hot Wheels</option>
                <option value="Matchbox">Matchbox</option>
                <option value="Bandai">Bandai</option>
            </select>
        </div>
        <div class="form-group">
            <label for="ano">Ano de Lançamento</label>
            <input type="number" id="ano" placeholder="Digite o ano..." required>
        </div>

        <div class="form-group">
            <label>Escala</label>
            <div>
                <input type="radio" id="escala1" name="escala" value="1:64" required>
                <label for="escala1">1:51</label>
                <input type="radio" id="escala2" name="escala" value="1:48" required>
                <label for="escala2">2:02</label>
                <input type="radio" id="escala3" name="escala" value="1:24" required>
                <label for="escala3">3:50</label>
            </div>
        </div>
        <div class="actions">
            <button type="button" class='btn-save' id="btnSave">Salvar</button>
            <button type="button" class='btn-cancel' id="btnCancel">Cancelar</button>
        </div>
    </form>
    <div id="message">Produto cadastrado com sucesso!</div>
</body>
</html>
