{% extends "base.html" %}

{% block title %}Login - HelpDesk Pro{% endblock %}

{% block guest_content %}
<div style="text-align: center; margin-bottom: 2rem;">
    <div class="brand-icon" style="width: 54px; height: 54px; margin: 0 auto 1rem auto; font-size: 1.6rem;">
        <i class="fa-solid fa-headset"></i>
    </div>
    <h2 style="font-family: 'Outfit', sans-serif; font-size: 1.8rem; font-weight: 700; color: #fff;">Acessar a Plataforma</h2>
    <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.3rem;">Digite seus dados para entrar no sistema de atendimento.</p>
</div>

<form method="POST" action="{{ url_for('auth.login') }}">
    <div class="form-group">
        <label for="email" class="form-label">E-mail Corporativo</label>
        <div style="position: relative;">
            <input type="email" id="email" name="email" class="form-control-custom" placeholder="seu.email@exemplo.com" required autofocus>
        </div>
    </div>

    <div class="form-group">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
            <label for="password" class="form-label" style="margin-bottom: 0;">Senha</label>
        </div>
        <input type="password" id="password" name="password" class="form-control-custom" placeholder="••••••••" required>
    </div>

    <div class="form-group" style="display: flex; align-items: center; justify-content: space-between; margin-top: 1rem;">
        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.85rem; color: var(--text-muted);">
            <input type="checkbox" name="remember" style="accent-color: var(--primary);"> Lembram de mim
        </label>
    </div>

    <button type="submit" class="btn-custom btn-primary-custom" style="width: 100%; padding: 0.85rem; margin-top: 1rem; font-size: 1rem;">
        Entrar no Sistema <i class="fa-solid fa-arrow-right"></i>
    </button>
</form>

<div style="text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--bg-card-border); font-size: 0.9rem; color: var(--text-muted);">
    Ainda não possui uma conta? 
    <a href="{{ url_for('auth.register') }}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Cadastre-se aqui</a>
</div>
{% endblock %}
